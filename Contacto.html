<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mi primer sitio web</title>
    <link rel="stylesheet" href="CSS/estilo.css">
</head>
<body class="wrapper">
    <header class="encabezado">
        <h1>Mi primer sitio web</h1>
        <nav class="menu" aria-label="Navegación principal">
            <ul class="menu-lista">
                <li><a href="INDEX.HTML">Inicio</a></li>
                <li><a href="acerca de.html">Acerca de</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a class="activo" href="Contacto.html">Contacto</a></li>
                <li><a href="Registro.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenido">
        <section class="seccion-principal">
            <h2>Contacto</h2>
            <p>¿Tienes alguna pregunta? Completa el siguiente formulario.</p>
        </section>

        <section class="card-formulario marco">
            <h3>Formulario de contacto</h3>
            <form action="" method="get" class="formulario-contacto">
                <div class="campo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" maxlength="50" minlength="5" placeholder="Escribe tu apellido y nombre" required>
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Escribe tu correo electrónico" required>
                </div>

                <div class="campo">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje" required></textarea>
                </div>

                <button type="submit" class="boton-principal">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="pie-pagina">
        <p>&copy; 2024 Mi primer sitio web. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
