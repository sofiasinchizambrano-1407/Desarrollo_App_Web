<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Mi primer sitio web</title>
    <link rel="stylesheet" href="CSS/CSS/estilo.css">
</head>
<body class="wrapper">
    <header class="encabezado">
        <h1>Mi primer sitio web</h1>
        <nav class="menu" aria-label="Navegación principal">
            <ul class="menu-lista">
                <li><a href="INDEX.HTML">Inicio</a></li>
                <li><a href="acerca de.html">Acerca de</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="Contacto.html">Contacto</a></li>
                <li><a class="activo" href="Registro.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenido">
        <section class="seccion-principal">
            <h2>Registro</h2>
            <p>Completa el siguiente formulario con tus datos personales.</p>
        </section>

        <section class="card-formulario marco">
            <h3>Formulario de registro</h3>
            <form action="" method="get" class="formulario-registro">
                <div class="campo">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required>
                </div>

                <div class="campo">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required>
                </div>

                <fieldset>
                    <legend>Género</legend>
                    <div class="radio-group">
                        <div class="radio-opcion">
                            <input type="radio" name="genero" id="masculino" value="masculino" required>
                            <label for="masculino">Masculino</label>
                        </div>
                        <div class="radio-opcion">
                            <input type="radio" name="genero" id="femenino" value="femenino">
                            <label for="femenino">Femenino</label>
                        </div>
                    </div>
                </fieldset>

                <div class="campo">
                    <label for="pais">País de residencia:</label>
                    <select name="pais" id="pais" required>
                        <option value="">-- Selecciona un país --</option>
                        <option value="ecuador">Ecuador</option>
                        <option value="argentina">Argentina</option>
                        <option value="colombia">Colombia</option>
                        <option value="peru">Perú</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="fechaNac">Fecha de nacimiento:</label>
                    <input type="date" id="fechaNac" name="fechaNac" required>
                </div>

                <button type="submit" class="boton-principal">Registrar</button>
            </form>
        </section>
    </main>

    <footer class="pie-pagina">
        <p>&copy; 2024 Mi primer sitio web. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
